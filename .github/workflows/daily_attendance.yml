name: Daily Attendance

on:
  schedule:
    # Runs at 12:00 UTC (5:30 PM IST) every day
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual trigger if needed

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Update README Date
        run: |
          python -c "
          import re
          from datetime import datetime
          
          # Get current date in 'Month Day, Year' format (e.g., 'June 20, 2026')
          today_str = datetime.utcnow().strftime('%B %d, %Y').replace(' 0', ' ')
          
          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()
              
          new_content = re.sub(
              r'<sub>Last updated: .*?</sub>',
              f'<sub>Last updated: {today_str}</sub>',
              content
          )
          
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(new_content)
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name "Umesh Pandey"
          git config --global user.email "umeshpandey0607@gmail.com"
          git diff --quiet || (git commit -am "docs: auto-update last updated timestamp" && git push)
